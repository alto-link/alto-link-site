<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせありがとうございます | Alto Link</title>
  <meta name="description" content="Alto Linkへのお問い合わせを受け付けました。">

  <style>
    :root {
      --navy: #102a5c;
      --sky: #6BC5F4;
      --light: #F0FAFF;
      --text: #1f2937;
      --muted: #64748b;
      --line: #dbe4f0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "M PLUS Rounded 1c", "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, #fff 0%, #F8FCFF 60%, #F0FAFF 100%);
      min-height: 100vh;
      line-height: 1.8;
      letter-spacing: 0.04em;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 80px 24px;
      text-align: center;
    }

    .card {
      background: #fff;
      border: 2px solid var(--navy);
      border-radius: 24px;
      padding: 48px 28px;
      box-shadow: 14px 14px 0 #DDF3FD;
    }

    .logo {
      width: 110px;
      margin-bottom: 20px;
    }

    .badge {
      display: inline-block;
      background: var(--light);
      color: var(--navy);
      border-radius: 999px;
      padding: 6px 16px;
      font-weight: 900;
      font-size: 13px;
      margin-bottom: 18px;
    }

    h1 {
      color: var(--navy);
      font-size: 32px;
      margin-bottom: 18px;
      font-weight: 900;
    }

    p {
      color: var(--muted);
      margin-bottom: 28px;
    }

    .btn {
      display: inline-block;
      background: var(--sky);
      color: var(--navy);
      padding: 13px 30px;
      border-radius: 999px;
      font-weight: 900;
      text-decoration: none;
    }

    .small {
      margin-top: 22px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="card">
      <img class="logo" src="assets/logo.png" alt="Alto Link ロゴ">


      <h1>お問い合わせありがとうございます</h1>

      <p>
        Alto Linkへのお問い合わせを受け付けました。<br>
        内容を確認のうえ、通常2営業日以内にご返信いたします。
      </p>

      <a class="btn" href="index.html">トップページへ戻る</a>

      <p class="small">
        ITをもっと身近に、もっと便利に。
      </p>
    </div>
  </main>
</body>
</html>
